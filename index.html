        .hidden-app { display: none !important; }
        .modal-enter { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        #splash-screen { transition: opacity 0.8s ease-out; }

        .paw-step { position: absolute; left: 50%; top: 50%; opacity: 0; font-size: 2.5rem; z-index: 5; }
        @keyframes walkIn {
            0% { opacity: 0; transform: scale(0.5) rotate(var(--rot)); color: #C48A8A; }
            30% { opacity: 1; transform: scale(1.1) rotate(var(--rot)); color: #3D6E79; }
            80% { opacity: 0.1; transform: scale(1) rotate(var(--rot)); color: #C48A8A; }
            100% { opacity: 0; transform: scale(1) rotate(var(--rot)); }
        }
        .paw-1 { margin-left: -50px; margin-top: 150px; --rot: -15deg; animation: walkIn 1.2s 0.1s forwards; }
        .paw-2 { margin-left:  30px; margin-top:  80px; --rot: 15deg; animation: walkIn 1.2s 0.4s forwards; }
        .paw-3 { margin-left: -30px; margin-top:  10px; --rot: -10deg; animation: walkIn 1.2s 0.7s forwards; }
        .paw-4 { margin-left:  40px; margin-top: -60px; --rot: 10deg; animation: walkIn 1.2s 1.0s forwards; }
        .paw-5 { margin-left: -10px; margin-top:-130px; --rot: -15deg; animation: walkIn 1.2s 1.3s forwards; }
        .splash-logo-container { opacity: 0; animation: fadeInLogo 1s 1.8s forwards; transform: translateY(20px); z-index: 10; }
        @keyframes fadeInLogo { to { opacity: 1; transform: translateY(0); } }

        function reportarAvistamiento(petName, contact) {
            alert("📍 Obteniendo tu ubicación GPS actual...\n\n✅ Señal enviada con éxito al servidor.\nEl dueño de " + petName + " (" + contact + ") ha sido notificado de que lo viste en esta zona.");
            closeModal();
        }

        function renderMarketCategory(title, items, icon, colorClass, isUserSale = false) {
            return `
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
                    <h3 class="font-black text-xs text-mascotik-teal mb-3 flex items-center gap-2"><div class="w-7 h-7 rounded-lg flex items-center justify-center ${colorClass}"><i class="fa-solid ${icon}"></i></div>${title}</h3>
                    <div class="space-y-3">
                        ${items.map(i => `
                            <div class="bg-animal-sand p-3 rounded-2xl">
                                <h4 class="font-bold text-xs text-gray-800">${i.name}</h4>
                                ${isUserSale ? `<p class="text-[10px] text-mascotik-rose font-bold">${i.item} - ${i.price}</p>` : `<p class="text-[10px] text-gray-600 mb-1">${i.serv}</p>`}
                                <div class="flex justify-between items-center mt-2">
                                    <span class="text-[10px] font-semibold text-mascotik-teal"><i class="fa-solid fa-phone"></i> ${i.phone}</span>
                                    ${!isUserSale ? `<a href="${i.map}" class="text-[9px] bg-white px-2 py-1 rounded border shadow-sm text-gray-500 hover:text-mascotik-teal"><i class="fa-solid fa-map"></i> Mapa</a>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function activarProtocoloCustodia() {
            var modalTitle = document.getElementById('modal-title');
            var modalBody = document.getElementById('modal-body');
            if(modalTitle && modalBody) {
                modalTitle.innerText = "Protocolo de Traslado";
                modalBody.innerHTML = `
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-mascotik-rose/30 animate-[slideUp_0.2s_ease-out]">
                        <div class="text-center mb-4"><i class="fa-solid fa-scale-balanced text-3xl text-mascotik-rose mb-2"></i><h3 class="font-black text-base text-mascotik-teal">Declaración Juramentada</h3><p class="text-[10px] text-gray-500 mt-2">Los animales son seres sintientes. No puedes simplemente "borrar" su existencia del sistema.</p></div>

                </div>`;

                html += `

                </div>`;

            subModal.innerHTML = html;

            var subModal = document.getElementById('sub-modal-content');
            if(!subModal) return;
            var html = ``;
            db.users['tienda1'].clients.forEach(c => {
                html += `

        function closeModal() { 
            var mc = document.getElementById('modals-container');
            if(mc) { mc.classList.add('hidden-app'); mc.classList.remove('flex'); }
        }
        function openModal() { 
            var mc = document.getElementById('modals-container');
            if(mc) { mc.classList.remove('hidden-app'); mc.classList.add('flex'); renderLogin(); }
        }
        function openChatbot() {
            var cb = document.getElementById('chatbot-container');
            if(cb) { cb.classList.remove('hidden-app'); cb.classList.add('flex'); }
        }
        function closeChatbot() {
            var cb = document.getElementById('chatbot-container');
            if(cb) { cb.classList.add('hidden-app'); cb.classList.remove('flex'); }
        }
        
        function renderLogin() { 
            var modalTitle = document.getElementById('modal-title');
            var modalBody = document.getElementById('modal-body');
            
            if(modalTitle && modalBody) {
                if (currentUser) {
                    modalTitle.innerText = "Mi Perfil"; 
                    modalBody.innerHTML = `
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 text-center mb-4 animate-[slideUp_0.2s_ease-out]">
